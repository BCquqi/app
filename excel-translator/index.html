<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Excel Translator</title>
    <link rel="stylesheet" href="style.css">
    <!-- 引入 SheetJS 核心库用于 Excel 解析与导出 -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Excel Translator</h1>
            <p>Upload .xlsx / .xls files → translate step by step → download the excel. </p>
        </header>

        <div class="toolbar">
            <div class="upload-area">
                <label for="excel-input" class="btn btn-primary">Upload</label>
                <input type="file" id="excel-input" accept=".xlsx, .xls, .csv" style="display: none;">
                <span id="file-name" class="file-info">No file chosen</span>
                <button id="reset-data-btn" class="btn btn-secondary" disabled>⟳ reset</button>
            </div>
            <div class="export-area">
                <button id="export-btn" class="btn btn-success" disabled>Download</button>
            </div>
        </div>

        <!-- 数据预览卡片 -->
        <div class="preview-card">
            <div class="card-header">
                <span>Data preview</span>
                <span id="data-dimension" class="dimension-badge">No data updated</span>
            </div>
            <div class="table-wrapper">
                <div id="table-preview" class="preview-table-container">
                    <div class="placeholder-text">Please upload an excel file first. </div>
                </div>
            </div>
        </div>

        <!-- 翻译操作面板 -->
        <div class="operation-panel">
            <div class="card-header">
                <span>New translation command</span>
                <span class="badge-info">Support multiple operations</span>
            </div>
            <div class="operation-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Source column</label>
                        <input type="number" id="source-col" min="1" step="1" value="1" class="col-input">
                        <small>Start from 1</small>
                    </div>
                    <div class="form-group">
                        <label>Source language</label>
                        <select id="source-lang" class="lang-select">
                            <option value="en">English</option>
                            <option value="zh" selected>简体中文</option>
                            <option value="ja">日本語</option>
                            <option value="ko">한국어</option>
                            <option value="fr">Français</option>
                            <option value="de">Deutsch</option>
                            <option value="es">Español</option>
                            <option value="ru">Русский</option>
                            <option value="it">Italiano</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Target language</label>
                        <select id="target-lang" class="lang-select">
                            <option value="en">English</option>
                            <option value="zh" selected>简体中文</option>
                            <option value="ja">日本語</option>
                            <option value="ko">한국어</option>
                            <option value="fr">Français</option>
                            <option value="de">Deutsch</option>
                            <option value="es">Español</option>
                            <option value="ru">Русский</option>
                            <option value="it">Italiano</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Target column</label>
                        <input type="number" id="target-col" min="1" step="1" value="2" class="col-input">
                        <small>Overridable result</small>
                    </div>
                    <div class="form-group action-group">
                        <button id="execute-translate-btn" class="btn btn-accent" disabled>⚡ translate</button>
                    </div>
                </div>
            </div>
            <!-- 操作记录/日志区 -->
            <div class="log-section">
                <div class="log-header">Operation log</div>
                <div id="operation-log" class="log-list">
                    <div class="log-empty">No operations yet. </div>
                </div>
                <div id="progress-info" class="progress-info" style="display: none;"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
